    direct_mirror_candidate: false
    fallback_behavior: expose_source_url_as_vault_reference
    confidence: high
    notes: >
      The CGP Order drives weekly inspection timing, documentation requirements,
      QSP duties, and corrective-action obligations. Referenced in swppp.weekly
      packet_rule via governing_order packet_role. Source URL is known and
      verified-direct, but the actual runtime-mirrored PDF byte copy is not present in
      the local pack directory. Classify as source_reference_only until a
      controlled crawler delivers the mirrored bytes.

