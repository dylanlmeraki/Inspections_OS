    direct_mirror_candidate: true
    fallback_behavior: use_as_canonical_template
    confidence: high
    notes: >
      The wizard manifest swppp.manifest.yaml defines the full section and field
      schema for the weekly inspection run. Sections: site_conditions, bmp_controls,
      documentation_presence, deficiencies, photos, signoff, gate_preview.
      This is the primary inspection execution asset for the swppp.weekly stage.

