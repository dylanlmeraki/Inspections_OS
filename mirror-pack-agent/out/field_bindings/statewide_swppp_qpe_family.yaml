  - binding_key: pre_qpe_overview_photos
    canonical_field_key: run.photos.pre_storm_overview_photos
    packet_field_key: photos.pre_storm_overview_photos
    target_section_key: photos
    target_field_key: pre_storm_overview_photos
    status: mapped
    transform: photo_attachment_list
    requiredness: required
    evidence_basis: >
      swppp.pre_qpe.manifest.yaml sections[photos].items[pre_storm_overview_photos]
    notes: Mosswood samples confirm pre-storm overview photos are standard practice.

unresolved_bindings:
  - binding_key: during_qpe_all_fields
    canonical_field_key: run.during_qpe.*
    packet_field_key: during_qpe.*
    target_section_key: during_qpe
    target_field_key: all
    status: unresolved
    transform: unresolved
    requiredness: unknown
    evidence_basis: >
      programs_and_stages.seed.yaml defines swppp.during_qpe as ordinal 65,
      but no wizard manifest exists for this stage. Mosswood examples suggest
      during-storm inspections occur but their exact field schema is not recoverable
      from the example outputs alone.
    notes: >
      Do not invent during_qpe field bindings. Requires wizard manifest
      authorship before any binding can be established.

  - binding_key: post_qpe_all_fields
    canonical_field_key: run.post_qpe.*
    packet_field_key: post_qpe.*
    target_section_key: post_qpe
    target_field_key: all
    status: unresolved
    transform: unresolved
    requiredness: unknown
    evidence_basis: >
      programs_and_stages.seed.yaml defines swppp.post_qpe as ordinal 70,
      but no wizard manifest exists. Post-storm discharge monitoring is required
      by the CGP but no template is available to bind fields from.
    notes: >
      Do not invent post_qpe field bindings. Requires wizard manifest
      authorship before any binding can be established.

  - binding_key: qpe_inspector_qualifications
    canonical_field_key: run.inspector.qsp_qualified
    packet_field_key: signoff.inspector_qsp_cert
    target_section_key: signoff
    target_field_key: inspector_qsp_cert
    status: unresolved
    transform: unresolved
    requiredness: required
    evidence_basis: >
      CGP 2022-0057-DWQ requires QPE inspections to be performed by a QSP or QSD.
      No field for QSP certification number or qualification level appears in the
      available wizard manifests.
    notes: >
      Must be added to wizard manifest before QPE stage can properly gate-advance.
      Acquisition of the specific CGP section number governing QSP requirements
      would support this binding.
