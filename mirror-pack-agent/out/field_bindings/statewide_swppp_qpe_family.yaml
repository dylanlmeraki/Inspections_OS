task_key: statewide_swppp_qpe_family

canonical_field_sets:
  - swppp_pre_qpe_forecast
  - swppp_pre_qpe_storm_readiness
  - swppp_pre_qpe_bmp_preparation
  - swppp_during_qpe_fields
  - swppp_post_qpe_fields

bindings:
  - binding_key: pre_qpe_forecast_source_name
    canonical_field_key: run.forecast.source_name
    packet_field_key: forecast.forecast_source_name
    target_section_key: forecast
    target_field_key: forecast_source_name
    status: mapped
    transform: string
    requiredness: required
    evidence_basis: >
      swppp.pre_qpe.manifest.yaml sections[forecast].items[forecast_source_name];
      packet_rules.seed.yaml rule_key=swppp.pre_qpe.requires_forecast_reference
    notes: Gate blocker PRE_QPE_FORECAST_METADATA_MISSING fires if missing.

  - binding_key: pre_qpe_forecast_issued_at
    canonical_field_key: run.forecast.issued_at
    packet_field_key: forecast.forecast_issued_at
    target_section_key: forecast
    target_field_key: forecast_issued_at
    status: mapped
    transform: iso8601_datetime
    requiredness: required
    evidence_basis: >
      swppp.pre_qpe.manifest.yaml sections[forecast].items[forecast_issued_at]
    notes: ""

  - binding_key: pre_qpe_qualifying_event_window
    canonical_field_key: run.forecast.qualifying_event_window
    packet_field_key: forecast.qualifying_event_window
    target_section_key: forecast
    target_field_key: qualifying_event_window
    status: mapped
    transform: string_or_structured_window
    requiredness: required
    evidence_basis: >
      swppp.pre_qpe.manifest.yaml sections[forecast].items[qualifying_event_window]
    notes: Describes the weather window (e.g., 0.5 inch / 24 hours) that triggers QPE status.

