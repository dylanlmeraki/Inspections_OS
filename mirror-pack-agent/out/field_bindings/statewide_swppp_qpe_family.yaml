    notes: ""

  - binding_key: pre_qpe_perimeter_verified
    canonical_field_key: run.bmp_preparation.perimeter_verified
    packet_field_key: bmp_preparation.perimeter_verified
    target_section_key: bmp_preparation
    target_field_key: perimeter_verified
