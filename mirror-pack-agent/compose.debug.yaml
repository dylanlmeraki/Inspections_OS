services:
  claudemirroragentbundlev2:
    image: claudemirroragentbundlev2
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 scripts/merge_summaries.py"]
    ports:
      - 5678:5678
