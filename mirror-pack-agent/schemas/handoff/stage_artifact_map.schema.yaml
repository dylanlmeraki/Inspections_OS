$schema: "http://json-schema.org/draft-07/schema#"
type: object
additionalProperties: false
required: [task_key, workflow_stage_codes, required_artifacts_by_stage]
properties:
  task_key: {type: string}
  workflow_stage_codes:
    type: array
    items: {type: string}
  required_artifacts_by_stage:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [workflow_stage_code, asset_keys, packet_roles]
      properties:
        workflow_stage_code: {type: string}
        asset_keys: {type: array, items: {type: string}}
        packet_roles: {type: array, items: {type: string}}
  summary: {type: object}
